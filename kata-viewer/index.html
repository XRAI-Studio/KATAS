<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Isshin Ryu Kata Viewer</title>
<link rel="stylesheet" href="css/app.css">
<script type="importmap">
{ "imports": { "three": "./lib/three/three.module.js" } }
</script>
</head>
<body>
<canvas id="scene"></canvas>

<div id="kiai-flash"></div>
<div id="kiai-text">KIAI!</div>
<div id="error-banner" class="hidden"></div>

<div id="hud">
  <div id="step-label">—</div>
  <div id="bunkai-card" class="hidden"></div>
</div>

<div id="controls">
  <div class="row">
    <select id="kata-select" title="Select kata"></select>
    <button id="btn-prev" title="Previous movement (←)">⏮</button>
    <button id="btn-play" title="Play / Pause (space)">▶</button>
    <button id="btn-next" title="Next movement (→)">⏭</button>
    <div id="scrub-wrap">
      <div id="markers"></div>
      <input id="scrub" type="range" min="0" max="100" step="0.01" value="0">
    </div>
    <label class="speed-label">Speed
      <input id="speed" type="range" min="0.1" max="5" step="0.05" value="1">
      <span id="speed-value">1.00x</span>
    </label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="toggle-bunkai"> Bunkai attacker</label>
    <label><input type="checkbox" id="toggle-voice" checked> Coach voice</label>
    <select id="voice-select" title="Coach voice"></select>
    <span id="camera-presets">
      <button data-preset="front">Front</button>
      <button data-preset="side">Side</button>
      <button data-preset="rear">Rear</button>
      <button data-preset="overhead">Overhead</button>
    </span>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
